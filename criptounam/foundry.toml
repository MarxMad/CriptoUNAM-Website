[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.19"
optimizer = true
optimizer_runs = 200
# via_ir resuelve stack-too-deep en CriptoUNAMDrops.createDrop (muchos args + evento detallado)
via_ir = true
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

# Endpoints RPC. Avalanche C-Chain (43114) es la red primaria.
# Fuji (43113) queda como testnet opcional para dry-runs antes de mainnet.
[rpc_endpoints]
avalanche      = "${AVAX_RPC_URL}"
avalanche_fuji = "${AVAX_FUJI_RPC_URL}"

# Verificación con Snowtrace (Routescan). Desde 2024 Snowtrace usa la API
# de Routescan; el endpoint v2 acepta una key de Routescan o "verifyContract"
# sin key para verificación básica. Mantén SNOWTRACE_API_KEY exportada para
# evitar rate limits.
[etherscan]
avalanche      = { key = "${SNOWTRACE_API_KEY}", chain = 43114, url = "https://api.routescan.io/v2/network/mainnet/evm/43114/etherscan" }
avalanche_fuji = { key = "${SNOWTRACE_API_KEY}", chain = 43113, url = "https://api.routescan.io/v2/network/testnet/evm/43113/etherscan" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
