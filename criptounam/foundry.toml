[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.19"
optimizer = true
optimizer_runs = 200
# via_ir resuelve stack-too-deep en CriptoUNAMDrops.createDrop (muchos args + evento detallado)
via_ir = true
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

# Endpoints RPC accesibles vía $ARBITRUM_RPC_URL etc.
# Override en local con tu propio Alchemy/Infura/QuickNode si quieres latencia menor.
[rpc_endpoints]
arbitrum         = "${ARBITRUM_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
mainnet          = "${MAINNET_RPC_URL}"
sepolia          = "${SEPOLIA_RPC_URL}"

# Verificación con Arbiscan / Etherscan.
# Arbiscan usa la misma API key que Etherscan (mismo proveedor).
[etherscan]
arbitrum         = { key = "${ARBISCAN_API_KEY}", chain = 42161, url = "https://api.arbiscan.io/api" }
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614, url = "https://api-sepolia.arbiscan.io/api" }
mainnet          = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
sepolia          = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
